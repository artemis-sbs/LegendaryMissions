# Hangar craft loadouts, per origin (the dock's origin; "terran" is the default).
#
# Each entry is a DELTA on top of a shipData hull, not a full restatement:
#   key       shipData hull key (name / base shields / base ammo come from there)
#   type      fighter | bomber | shuttle  - the craft's variant role + displayed
#             class; also the filter used by hangar_random_craft_spawn()
#   upgrades  default fit applied at spawn via the item/upgrade system
#             (hangar.py hangar_apply_loadout). Each entry is either an item key
#             string, or {item: <key>, ...extra} whose extra fields pass to the
#             item effect. Effects layer on the hull values:
#               - cockpit_shields              x2 shields (shield_upgrade_coeff)
#               - {item: torp_bay, torp_type:, amount:}  ADDS that ammo on top
#                 of the hull's shipData torpedostart
#               - {item: torp_loader, coeff:}  speeds rearming: multiplies the
#                 per-torpedo refit time (default x0.5). Add to a craft's upgrades
#                 list to fit it, e.g.  - {item: torp_loader, coeff: 0.5}
#
# Note one hull can back two variants (e.g. xim_avenger is both fighter and
# bomber) - that is exactly what the per-loadout upgrade list is for.

terran:
  - key: tsn_fighter
    type: fighter
    upgrades:
      - cockpit_shields
      - {item: torp_bay, torp_type: Homing, amount: 0}   # hull has 5
  - key: tsn_bomber
    type: bomber
    upgrades:
      - cockpit_shields
      - {item: torp_bay, torp_type: Nuke, amount: 1}      # hull already has Homing 10
      - {item: torp_bay, torp_type: EMP, amount: 1}
      - {item: torp_bay, torp_type: Mine, amount: 1}
  - key: tsn_shuttle
    type: shuttle
    upgrades:
      - cockpit_shields
      - {item: torp_bay, torp_type: Homing, amount: 1}

